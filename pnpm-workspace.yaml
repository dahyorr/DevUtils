packages:
  - "frontend"
  - "backend"
  - "worker"

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  es5-ext: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "es5-ext"
  - "prisma"
  - "sharp"
  - "unrs-resolver"
  - "@tauri-apps/cli"
