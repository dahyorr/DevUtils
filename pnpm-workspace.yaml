packages:
  - "frontend"
  - "backend"
  - "worker"

overrides:
  prisma: "npm:@types/node@*"
  "@prisma/client": "npm:@types/node@*"

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': false
  es5-ext: true
  esbuild: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@parcel/watcher"
  - "es5-ext"
  - "esbuild"
  - "sharp"
  - "unrs-resolver"
  - "@tauri-apps/cli"

minimumReleaseAgeExclude:
  - '@mui/core-downloads-tracker@9.2.0'
  - '@mui/icons-material@9.2.0'
  - '@mui/material@9.2.0'
  - '@mui/private-theming@9.2.0'
  - '@mui/system@9.2.0'
  - '@mui/utils@9.2.0'
