packages:
  - "frontend"
  - "backend"
  - "worker"

autoInstallPeers: false

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': false
  es5-ext: true
  esbuild: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@parcel/watcher"
  - "es5-ext"
  - "esbuild"
  - "sharp"
  - "unrs-resolver"
  - "@tauri-apps/cli"
